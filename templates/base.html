<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Аудиогид{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>

<body>
    <header>
        <div class="container">
            <a href="/" class="logo">🎧 Аудиогиды</a>
            <nav>
                <a href="/create" class="btn btn-sm">+ Создать</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>Лучшие аудиогиды по мнению разработчика.</p>
        </div>
    </footer>
    {% block extra_scripts %}{% endblock %}
</body>

</html>
